<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Porra Mundial 2026</title>
  <style>
    :root {
      --ink: #081225;
      --navy: #061226;
      --blue: #0f5fff;
      --cyan: #00b8d9;
      --mint: #00b778;
      --gold: #ffd447;
      --orange: #ff7a1a;
      --red: #ff3158;
      --paper: #fffaf0;
      --line: rgba(8, 18, 37, .14);
      --display: "Arial Black", Impact, "Aptos Display", sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--navy); }
    body {
      margin: 0;
      color: var(--ink);
      font-family: Aptos, "Segoe UI", system-ui, sans-serif;
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px) 0 0 / 84px 84px,
        linear-gradient(0deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 84px 84px,
        linear-gradient(135deg, #061226 0 64%, #092458 64% 78%, #0a3d2e 78% 100%);
    }
    .wrap { width: min(1220px, calc(100vw - 28px)); margin: 0 auto; padding: 24px 0 38px; }
    .hero {
      color: #fff;
      border-radius: 8px;
      padding: 24px 24px 22px;
      background:
        linear-gradient(90deg, var(--red) 0 6px, transparent 6px),
        rgba(6,18,38,.82);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 44px rgba(0,0,0,.24);
      overflow: hidden;
      position: relative;
    }
    .hero h1 { margin: 0 0 6px; font: 900 2.5rem/.9 var(--display); text-transform: uppercase; }
    .hero p { margin: 0; color: rgba(255,255,255,.82); font-weight: 750; }
    .nav { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .nav a { color: #061226; background: var(--gold); padding: 9px 12px; border-radius: 6px; font: 900 .82rem var(--display); text-transform: uppercase; text-decoration: none; box-shadow: inset 0 -4px 0 rgba(6,18,38,.18); }
    .nav a:nth-child(2) { color: #fff; background: var(--blue); }
    .history-gate { display: flex; justify-content: center; margin: 16px 0 2px; }
    .history-button { color: #fff; background: #061226; border: 2px solid var(--gold); padding: 12px 16px; border-radius: 8px; font: 900 .9rem var(--display); text-transform: uppercase; text-decoration: none; box-shadow: 0 12px 28px rgba(0,0,0,.18); }
    .history-button:hover { background: var(--gold); color: #061226; }
    .history-stack { display: grid; gap: 14px; margin-top: 14px; }
    .summary { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
    .tile { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; box-shadow: 0 14px 34px rgba(0,0,0,.12); position: relative; overflow: hidden; border-top: 4px solid var(--blue); }
    .tile:nth-child(2) { border-top-color: var(--mint); }
    .tile strong { display: block; font: 900 1.7rem/1 var(--display); }
    .tile span { color: #526071; font-weight: 800; }
    .panel { background: rgba(255,255,255,.96); border: 1px solid rgba(255,255,255,.44); border-radius: 8px; margin-top: 14px; overflow: hidden; box-shadow: 0 14px 38px rgba(0,0,0,.14); }
    .panel-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 14px 16px; color: #fff; background: linear-gradient(95deg, var(--navy), #0b2f6f 48%, #0b5f46); border-bottom: 4px solid var(--gold); }
    .panel-head h2 { margin: 0; font: 900 1.35rem/.95 var(--display); text-transform: uppercase; }
    .panel-head span { color: rgba(255,255,255,.78); font-weight: 850; }
    .empty { padding: 22px; color: #596679; font-weight: 850; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; }
    th { background: #061226; color: #fff; font: 900 .72rem var(--display); text-transform: uppercase; }
    .points { font: 900 1.15rem var(--display); }
    .compact th, .compact td { padding: 8px 10px; }
    .week-list { display: grid; gap: 10px; padding: 12px; background: #f7f9fc; border-top: 1px solid var(--line); }
    .week-detail { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden; }
    .week-detail summary { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 12px 14px; cursor: pointer; list-style: none; }
    .week-detail summary::-webkit-details-marker { display: none; }
    .week-detail summary strong { font: 900 .98rem var(--display); text-transform: uppercase; }
    .week-detail summary span { color: #526071; font-weight: 850; }
    .week-detail summary::after { content: "+"; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--gold); color: #061226; font: 900 1.1rem var(--display); }
    .week-detail[open] summary::after { content: "-"; }
    .history-list { background: #fff; }
    .legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 10px 12px; background: #f7f9fc; border-bottom: 1px solid var(--line); color: #536174; font-size: .84rem; font-weight: 800; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot.exact { background: #0f5fff; }
    .dot.diff { background: #00b778; }
    .dot.sign { background: #ffd447; border: 1px solid rgba(8,18,37,.22); }
    .dot.miss { background: #ff3158; }
    .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; padding: 12px; }
    .match-card { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden; box-shadow: 0 10px 26px rgba(8,18,37,.1); }
    .match-card header { display: flex; justify-content: space-between; gap: 10px; padding: 11px; background: #061226; color: #fff; border-left: 9px solid var(--red); }
    .match-card.match-played header { border-left-color: var(--cyan); background: linear-gradient(95deg, #061226, #08336f); }
    .match-card header strong { display: block; font-weight: 950; }
    .match-card header span { color: rgba(255,255,255,.7); }
    .result-pill { align-self: center; border-radius: 8px; padding: 7px 9px; color: #061226; background: var(--gold); font: 900 .85rem var(--display); white-space: nowrap; text-transform: uppercase; }
    .result-pill.played { color: #fff; background: var(--blue); box-shadow: 0 0 0 3px rgba(15,95,255,.22); }
    .match-card tr { transition: background .15s ease; }
    .match-card td:nth-child(2), .match-card td:nth-child(3), .match-card td:nth-child(4) { text-align: right; font-weight: 950; white-space: nowrap; }
    .pick-pending { background: #fff; }
    .pick-exact { background: #d8e9ff; color: #082a63; }
    .pick-diff { background: #dff8e9; color: #053621; }
    .pick-sign { background: #fff2a8; color: #493700; }
    .pick-miss { background: #ffd6de; color: #5e0618; }
    footer { color: rgba(255,255,255,.68); text-align: center; font-size: .82rem; font-weight: 700; margin-top: 18px; }
    @media (max-width: 720px) {
      .summary { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.9rem; }
      th, td { padding: 8px; }
      .match-card header { display: grid; }
      .result-pill { justify-self: start; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Histórico Mundial 2026</h1>
      <p>Semana 1 - 15-18 junio 2026 (hasta 10:00) · Actualizado 18 jun 2026, 9:23 · Refrescos del dia de bocata en juego.</p>
      <nav class="nav">
        <a href="index.html">Volver a la jornada</a>
      </nav>
    </section>
    
      
    
    <footer>Pagina estatica generada desde el HTML consolidado.</footer>
  </main>
</body>
</html>
